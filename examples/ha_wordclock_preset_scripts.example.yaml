# Home Assistant scripts for Word Clock brightness mode control.
# Add this content to `scripts.yaml`, then reload scripts.
#
# Behavior:
# - `Auto` enables the solar-radiation automation and applies an immediate target brightness.
# - Manual presets disable the solar-radiation automation before setting brightness.

word_clock_enable_auto_brightness:
  alias: Word Clock - Enable Auto Brightness
  icon: mdi:auto-mode
  mode: single
  sequence:
    - action: automation.turn_on
      target:
        entity_id: automation.word_clock_auto_brightness
    - action: automation.trigger
      target:
        entity_id: automation.word_clock_auto_brightness

word_clock_preset_night:
  alias: Word Clock - Preset Night
  icon: mdi:weather-night
  mode: single
  sequence:
    - action: automation.turn_off
      target:
        entity_id: automation.word_clock_auto_brightness
    - action: light.turn_on
      target:
        entity_id: light.word_clock
      data:
        brightness_pct: 20
        transition: 1

word_clock_preset_evening:
  alias: Word Clock - Preset Evening
  icon: mdi:weather-sunset
  mode: single
  sequence:
    - action: automation.turn_off
      target:
        entity_id: automation.word_clock_auto_brightness
    - action: light.turn_on
      target:
        entity_id: light.word_clock
      data:
        brightness_pct: 45
        transition: 1

word_clock_preset_day:
  alias: Word Clock - Preset Day
  icon: mdi:white-balance-sunny
  mode: single
  sequence:
    - action: automation.turn_off
      target:
        entity_id: automation.word_clock_auto_brightness
    - action: light.turn_on
      target:
        entity_id: light.word_clock
      data:
        brightness_pct: 80
        transition: 1
