# Home Assistant Lovelace dashboard template for HA 2026.3+ (Sections view).
# Paste into a manual dashboard (Raw configuration editor) or adapt per-view.
# Uses `custom:mushroom-light-card` for live icon/brightness color feedback.
#
# Required entity:
#   light.word_clock
#
# Color preset dropdown entity (adjust if your entity_id differs):
#   select.word_clock_color_preset
#   select.word_clock_splash_interval
#
# Auto/manual mode entities:
#   automation.word_clock_auto_brightness
#   script.word_clock_enable_auto_brightness
#   script.word_clock_preset_night
#   script.word_clock_preset_evening
#   script.word_clock_preset_day
#   script.word_clock_preset_off
#
# Optional helper entities (if HA generated them):
#   select.word_clock_effect
#   button.word_clock_flash
#   button.word_clock_long_flash

title: Word Clock
views:
  - type: sections
    title: Word Clock
    path: word-clock
    icon: mdi:clock-time-four-outline
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Word Clock
            icon: mdi:clock-time-four-outline

          - type: custom:mushroom-light-card
            entity: light.word_clock
            name: Word Clock Brightness
            use_light_color: true
            show_brightness_control: true
            show_color_control: false
            collapsible_controls: false
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            grid_options:
              columns: full

          - type: entities
            show_header_toggle: false
            entities:
              - entity: select.word_clock_color_preset
                name: Color preset
              - entity: select.word_clock_splash_interval
                name: Splash Interval
              - entity: automation.word_clock_auto_brightness
                name: Auto brightness

          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Auto
                icon: mdi:auto-mode
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.word_clock_enable_auto_brightness

              - type: button
                name: Night
                icon: mdi:weather-night
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.word_clock_preset_night

              - type: button
                name: Evening
                icon: mdi:weather-sunset
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.word_clock_preset_evening

              - type: button
                name: Day
                icon: mdi:white-balance-sunny
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.word_clock_preset_day
